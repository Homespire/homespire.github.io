<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Florentino Beltran — Territory Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0f0120;
  --purple:  #9333EA;
  --fuchsia: #D946EF;
  --pink:    #F472B6;
  --gold:    #F5C842;
  --indigo:  #6366F1;
  --white:   #FFFFFF;
}
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--white);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 28px;
  background: rgba(15,1,32,0.97);
  border-bottom: 1px solid rgba(255,255,255,0.07);
  flex-shrink: 0;
  z-index: 10;
}
.hl { display: flex; align-items: center; gap: 14px; }
.hmark {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, #9333EA, #D946EF);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 15px;
}
.htitle { font-size: 16px; font-weight: 800; }
.hsub   { font-size: 11px; color: rgba(255,255,255,0.45); margin-top:1px; }
.hstats { display: flex; gap: 20px; align-items: center; }
.hs { text-align: center; }
.hs-n {
  font-size: 19px; font-weight: 900;
  background: linear-gradient(135deg, #fff, #D946EF);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.hs-l { font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.45); letter-spacing: .1em; text-transform: uppercase; }
.hdiv { width: 1px; height: 28px; background: rgba(255,255,255,0.08); }

/* ── MAP WRAPPER ── */
.map-wrap {
  flex: 1; position: relative; overflow: hidden;
}
svg#map { width: 100%; height: 100%; }

/* ── LEGEND ── */
.legend {
  position: absolute; bottom: 20px; left: 20px;
  background: rgba(15,1,32,0.92);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 14px; padding: 14px 18px;
  backdrop-filter: blur(16px);
  z-index: 5;
}
.leg-title { font-size: 9px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #D946EF; margin-bottom: 10px; }
.leg-row { display: flex; align-items: center; gap: 9px; margin-bottom: 7px; font-size: 11px; color: rgba(255,255,255,0.65); }
.leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.leg-sep { margin-top: 10px; padding-top: 9px; border-top: 1px solid rgba(255,255,255,0.07); }

/* ── TOOLTIP ── */
.tooltip {
  position: absolute;
  pointer-events: none;
  background: rgba(20, 4, 50, 0.97);
  border: 1px solid rgba(217,70,239,0.4);
  border-radius: 14px;
  padding: 14px 18px;
  min-width: 200px;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity .18s ease, transform .18s ease;
  z-index: 20;
  box-shadow: 0 12px 40px rgba(0,0,0,0.6);
}
.tooltip.show { opacity: 1; transform: translateY(0); }
.tt-price {
  font-size: 24px; font-weight: 900; line-height: 1;
  background: linear-gradient(135deg, #fff, #D946EF);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.tt-addr { font-size: 11px; color: rgba(255,255,255,0.65); margin-top: 5px; line-height: 1.4; }
.tt-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.tag {
  padding: 2px 9px; border-radius: 100px;
  font-size: 9px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
}
.tag-fha  { background: rgba(217,70,239,.2);  border: 1px solid rgba(217,70,239,.5); color: #D946EF; }
.tag-conv { background: rgba(147,51,234,.2);  border: 1px solid rgba(147,51,234,.5); color: #c084fc; }
.tag-va   { background: rgba(244,114,182,.2); border: 1px solid rgba(244,114,182,.5); color: #F472B6; }
.tag-cash { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.2); color: rgba(255,255,255,.6); }
.tag-gold { background: rgba(245,200,66,.15); border: 1px solid rgba(245,200,66,.4); color: #F5C842; }
.tag-juan { background: rgba(99,102,241,.2);  border: 1px solid rgba(99,102,241,.5); color: #a5b4fc; }

/* ── PIN ANIMATION ── */
@keyframes pin-in {
  0%   { opacity:0; transform: scale(0) translateY(20px); }
  70%  { transform: scale(1.15) translateY(-4px); }
  100% { opacity:1; transform: scale(1) translateY(0); }
}
.pin-g { animation: pin-in .5s cubic-bezier(.34,1.56,.64,1) both; }

@keyframes pulse {
  0%,100% { r: 6; opacity: .5; }
  50% { r: 14; opacity: 0; }
}
.pulse-ring { animation: pulse 2.2s ease-out infinite; }
</style>
</head>

const tt = document.getElementById('tt');

function tagHTML(loan, juan, isTop) {
  const lc = loan.toLowerCase();
  let html = `<span class="tag tag-${lc}">${loan}</span>`;
  html += `<span class="tag tag-cash">${deals.find(d=>true)? '' : ''}`;
  if (juan)  html += `<span class="tag tag-juan">⭐ w/ Juan Farias</span>`;
  if (isTop) html += `<span class="tag tag-gold">🏆 Top Sale</span>`;
  return html;
}

document.querySelectorAll('.hit').forEach(el => {
  el.style.cursor = 'pointer';

  el.addEventListener('mouseenter', (e) => {
    const idx = +el.dataset.idx;
    const d = deals[idx];
    const isTop = d.price === '$842K';
    const lc = d.loan.toLowerCase();

    let badges = `<span class="tag tag-${lc}">${d.loan}</span>`;
    badges += `<span class="tag tag-cash">${d.date}</span>`;
    if (d.juan)  badges += `<span class="tag tag-juan">⭐ w/ Juan Farias</span>`;
    if (isTop)   badges += `<span class="tag tag-gold">🏆 Top Sale</span>`;

    tt.innerHTML = `
      <div class="tt-price">${d.price}</div>
      <div class="tt-addr">${d.addr}<br>${d.city}</div>
      <div class="tt-tags">${badges}</div>`;

    // Position tooltip using SVG viewBox coordinates → screen coords
    const svgRect = svgEl.getBoundingClientRect();
    const scaleX = svgRect.width / 1140;
    const scaleY = svgRect.height / 680;
    let px = d.x * scaleX + svgRect.left;
    let py = d.y * scaleY + svgRect.top;

    // Clamp to viewport
    const ttW = 220, ttH = 110;
    if (px + ttW + 20 > window.innerWidth) px -= ttW + 20;
    else px += 20;
    if (py - 20 < 0) py += 20;
    else py -= 60;

    tt.style.left = px + 'px';
    tt.style.top  = py + 'px';
    tt.classList.add('show');
  });

  el.addEventListener('mouseleave', () => {
    tt.classList.remove('show');
  });
});
